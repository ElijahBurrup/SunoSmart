{% extends "base.html" %}

{% block title %}{{ article['title'] }}{% endblock %}

{% block content %}
<div class="container">
    <div class="article-full">
        <div class="date">{{ article['generated_date'] }}</div>
        <h1>{{ article['title'] }}</h1>
        <div class="content">{{ article['content'] | safe }}</div>
    </div>
    <div style="margin-top:24px;text-align:center">
        <a href="{{ url_for('main.news_archive') }}">&larr; Back to News Archive</a>
    </div>
</div>
{% endblock %}
